<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TYMICT Install Manager v2</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="app-header">
    <div>
      <h1>TYMICT Install Manager</h1>
      <p>장착 정보 · 사진 · 고객 이력 · Confluence 자동 생성</p>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="dashboard">대시보드</button>
    <button class="tab" data-tab="form">장착등록</button>
    <button class="tab" data-tab="photos">사진관리</button>
    <button class="tab" data-tab="list">장착목록</button>
  </nav>

  <main class="container">
    <section id="dashboardTab" class="page">
      <div class="card">
        <h2>대시보드</h2>
        <div class="summary-grid">
          <div class="summary-card">
            <strong id="totalCount">0</strong>
            <span>전체 장착</span>
          </div>
          <div class="summary-card">
            <strong id="monthCount">0</strong>
            <span>이번 달</span>
          </div>
          <div class="summary-card">
            <strong id="photoCount">0</strong>
            <span>사진</span>
          </div>
          <div class="summary-card">
            <strong id="confluenceCount">0</strong>
            <span>Confluence 생성</span>
          </div>
        </div>
      </div>
    </section>

    <section id="formTab" class="page hidden">
      <form id="installForm" class="card">
        <input type="hidden" id="recordId" />

        <h2>장착 등록</h2>

        <h3>1. 기본 정보</h3>
        <div class="grid three">
          <label>장착일자
            <input type="date" name="install_date" required />
          </label>
          <label>주문접수일
            <input type="date" name="order_date" />
          </label>
          <label>장착상태
            <select name="status">
              <option value="draft">임시저장</option>
              <option value="installed">장착완료</option>
              <option value="educated">교육완료</option>
              <option value="confluence_created">Confluence 생성</option>
            </select>
          </label>
        </div>

        <h3>2. 거래처 정보</h3>
        <div class="grid three">
          <label>판매처
            <select name="sales_channel">
              <option></option>
              <option>대리점</option>
              <option>B2B</option>
              <option>정부기관</option>
              <option>농협</option>
              <option>기타</option>
            </select>
          </label>
          <label>딜러점/거래처명
            <input name="dealer_name" />
          </label>
          <label>대표자
            <input name="representative" />
          </label>
        </div>

        <h3>3. 제품 정보</h3>
        <div class="grid three">
          <label>제품명
            <input name="product_name" value="AGDICT 자율주행키트" required />
          </label>
          <label>BOX S/N
            <input name="box_sn" required />
          </label>
          <label>KEYPAD S/N
            <input name="keypad_sn" />
          </label>
          <label>스플라인
            <input name="spline" />
          </label>
          <label>브라켓
            <input name="bracket" />
          </label>
          <label>후방카메라
            <select name="rear_camera">
              <option></option>
              <option>장착</option>
              <option>미장착</option>
            </select>
          </label>
        </div>

        <h3>4. 농기계 정보</h3>
        <div class="grid three">
          <label>기종
            <select name="machine_type">
              <option></option>
              <option>트랙터</option>
              <option>이앙기</option>
              <option>승용관리기</option>
              <option>기타</option>
            </select>
          </label>
          <label>제조사
            <input name="manufacturer" />
          </label>
          <label>모델명/S/N
            <input name="model_sn" />
          </label>
        </div>

        <h3>5. 고객 정보</h3>
        <div class="grid two">
          <label>고객명
            <input name="customer_name" required />
          </label>
          <label>연락처
            <input name="customer_phone" type="tel" required />
          </label>
          <label>주소
            <input name="customer_address" />
          </label>
          <label>교육일자
            <input name="education_date" type="date" />
          </label>
          <label>농사규모
            <input name="farm_scale" />
          </label>
          <label>주요작물
            <input name="main_crop" />
          </label>
        </div>

        <h3>6. 소프트웨어 버전</h3>
        <div class="grid three">
          <label>AD A1 Software <input name="ad_a1_software" /></label>
          <label>CoA F/W <input name="coa_fw" /></label>
          <label>INS Ver <input name="ins_ver" /></label>
          <label>MoA F/W <input name="moa_fw" /></label>
          <label>CPG F/W <input name="cpg_fw" /></label>
          <label>ADC2 <input name="adc2" /></label>
          <label>CPAD S/W <input name="cpad_sw" /></label>
        </div>

        <h3>7. 작업자 및 이슈</h3>
        <div class="grid two">
          <label>장착주체
            <input name="install_subject" placeholder="TYMICT / 대리점 / 기타" />
          </label>
          <label>장착직원
            <input name="installer" placeholder="예: 최병진, 홍길동" />
          </label>
        </div>

        <label>주요 이슈
          <textarea name="major_issue"></textarea>
        </label>

        <label>비고
          <textarea name="memo"></textarea>
        </label>

        <div class="actions">
          <button id="saveBtn" type="submit" class="primary">저장</button>
          <button type="button" class="secondary" id="newRecordBtn">신규 입력</button>
          <button type="button" class="secondary" id="goPhotoBtn">사진 관리</button>
        </div>
      </form>
    </section>

    <section id="photosTab" class="page hidden">
    <div class="card">
        <h2>사진관리</h2>

        <p class="muted">
            장착목록에서 보기 버튼을 눌러 장착 정보를 연 뒤 사진을 업로드하세요.
        </p>

        <div class="photo-upload-box">
            <input
                type="file"
                id="photoInput"
                multiple
                accept="image/*">

            <button
                type="button"
                class="primary"
                id="uploadPhotoBtn">
                사진 업로드
            </button>
        </div>

        <div id="photoPreview" class="photo-grid"></div>
    </div>
</section>

    <section id="listTab" class="page hidden">
      <div class="card">
        <h2>장착목록</h2>
        <div class="toolbar">
          <input id="searchInput" placeholder="고객명, BOX S/N, 모델명, 딜러점 검색" />
          <button id="refreshBtn" class="secondary">새로고침</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>장착일</th>
                <th>고객</th>
                <th>제품/BOX</th>
                <th>농기계</th>
                <th>상태</th>
                <th>관리</th>
              </tr>
            </thead>
            <tbody id="recordsBody">
              <tr>
                <td colspan="6" class="empty">저장된 데이터가 없습니다.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="script.js"></script>
</body>

</html>
